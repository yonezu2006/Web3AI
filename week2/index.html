<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>グーフィーのお買い物ランニング</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- 描画用キャンバス -->
        <canvas id="gameCanvas" width="800" height="450"></canvas>

        <!-- メーター表示 -->
        <div id="ui-distance" class="hidden">0m</div>
        <!-- ライフ表示 -->
        <div id="ui-lives" class="hidden">♡♡♡</div>

        <!-- タイトル画面 -->
        <div id="screen-title" class="screen">
            <img src="gu_fi.png" id="title-silhouette" alt="Silhouette">
            <div class="title-content">
                <h1 id="main-title"><span class="c-orange">グーフィー</span>の<br><span class="c-green">お買い物</span><span
                        class="c-orange">ランニング</span></h1>
                <p id="btn-start" class="blink">はじめる</p>
            </div>
        </div>

        <!-- あらすじ（イントロ）画面 -->
        <div id="screen-intro" class="screen hidden overlay-bg">
            <div class="dialog-box">
                <p class="dialog-text">「サンドイッチを作っていたら，<br>パストラミハムがなかった！<br>グーフィーのために買ってきてあげよう！！」</p>
                <p class="prompt-text blink">スペースキーで進む</p>
            </div>
        </div>

        <!-- エンディング画面 -->
        <div id="screen-ending" class="screen hidden overlay-bg">
            <div class="dialog-box">
                <p class="dialog-text">「無事パストラミハムを<br>買えました！」</p>
                <p class="prompt-text blink">スペースキーでタイトルへ</p>
            </div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="screen-gameover" class="screen hidden overlay-bg">
            <div class="dialog-box">
                <p class="dialog-text">「買物途中で疲れ果ててスーパーにたどり着けず、<br>パストラミハムを買えなかった…」</p>
                <p class="prompt-text blink">スペースキーでタイトルへ</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
